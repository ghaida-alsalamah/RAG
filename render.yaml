services:
  - type: web
    name: goriyadh
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # you set this manually in the Render dashboard
    autoDeploy: true
